name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            tools/requirements.txt
            tools/structure_generator/requirements.txt

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # This is needed to be able to run ./gradlew below
      # You can run `git update-index --chmod +x gradlew` then remove this step.
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Install Python validator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/requirements.txt

      - name: Verify release build
        run: ./gradlew verifyEchoRelease -x checkEchoModJarSet

      - name: Collect built JAR artifacts
        run: |
          set -euo pipefail
          mkdir -p dist/jars
          mapfile -t jar_files < <(
            find \
              build/libs \
              core/echocore/build/libs \
              addons \
              -type f \
              -name '*.jar' \
              ! -name '*-sources.jar' \
              ! -name '*-javadoc.jar' \
              \( \
                -path 'build/libs/*' -o \
                -path 'core/echocore/build/libs/*' -o \
                -path 'addons/*/build/libs/*' \
              \) \
              | sort
          )

          if [ "${#jar_files[@]}" -eq 0 ]; then
            echo "No runtime JARs were found."
            exit 1
          fi

          for jar in "${jar_files[@]}"; do
            cp "$jar" "dist/jars/$(basename "$jar")"
          done

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: echo-jars-${{ github.sha }}
          path: dist/jars/*.jar
          if-no-files-found: error
          retention-days: 21

      - name: Summarize built JARs
        run: |
          set -euo pipefail
          {
            echo "## Runtime JAR Artifacts"
            echo
            echo "| Module | JAR |"
            echo "| --- | --- |"

            mapfile -t summary_jars < <(
              find \
                build/libs \
                core/echocore/build/libs \
                addons \
                -type f \
                -name '*.jar' \
                ! -name '*-sources.jar' \
                ! -name '*-javadoc.jar' \
                \( \
                  -path 'build/libs/*' -o \
                  -path 'core/echocore/build/libs/*' -o \
                  -path 'addons/*/build/libs/*' \
                \) \
                | sort
            )

            for jar in "${summary_jars[@]}"; do
              module="$jar"
              case "$jar" in
                build/libs/*)
                  module="root"
                  ;;
                core/echocore/build/libs/*)
                  module="core/echocore"
                  ;;
                addons/*/build/libs/*)
                  module="${jar#addons/}"
                  module="addons/${module%%/*}"
                  ;;
              esac

              echo "| ${module} | $(basename "$jar") |"
            done
          } >> "$GITHUB_STEP_SUMMARY"
