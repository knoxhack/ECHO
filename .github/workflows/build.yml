name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            tools/requirements.txt
            tools/structure_generator/requirements.txt

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # This is needed to be able to run ./gradlew below
      # You can run `git update-index --chmod +x gradlew` then remove this step.
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Install Python validator dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/requirements.txt

      - name: Verify release build
libs/*)
                module="root"
                ;;
              */core/echocore/build/libs/*)
                module="core/echocore"
                ;;
              */addons/*/build/libs/*)
                module="${jar#*/addons/}"
                module="addons/${module%%/*}"
                ;;
            esac

            target_name="${module//\//__}__$(basename "$jar")"
            cp "$jar" "dist/jars/$target_name"
            printf '%s\t%s\t%s\n' "$module" "$(basename "$jar")" "$target_name" >> dist/jars/manifest.tsv
          done

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: echo-jars-${{ github.sha }}
          path: dist/jars/*.jar
          if-no-files-found: error
          retention-days: 21

      - name: Summarize built JARs
        run: |
          set -euo pipefail
          {
            echo "## Runtime JAR Artifacts"
            echo
            echo "| Module | JAR |"
            echo "| --- | --- |"
            while IFS=$'\t' read -r module source_jar target_jar; do
              echo "| ${module} | ${source_jar} (`${target_jar}`) |"
            done < dist/jars/manifest.tsv
          } >> "$GITHUB_STEP_SUMMARY"
=======
        run: ./gradlew verifyEchoRelease validateReleaseArtifacts -x checkEchoModJarSet

      - name: Generate release manifest
        run: ./gradlew printReleaseManifest > release-manifest.txt

      - name: Upload release manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.txt

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-manifest.txt
      - name: Verify release build
        run: ./gradlew verifyEchoRelease -x checkEchoModJarSet

      - name: Collect built JAR artifacts
        run: |
          set -euo pipefail
          mkdir -p dist/jars
          project_name="${GITHUB_REPOSITORY##*/}"
          gradle_build_root="${ECHO_GRADLE_BUILD_DIR:-${RUNNER_TEMP:-/tmp}/EchoGradleBuild}"
          artifact_root="${gradle_build_root}/${project_name}"
          mapfile -t jar_files < <(
            find "$artifact_root" \
              -type f \
              -path '*/build/libs/*.jar' \
              ! -name '*-sources.jar' \
              ! -name '*-javadoc.jar' \
              | sort
          )

          if [ "${#jar_files[@]}" -eq 0 ]; then
            echo "No runtime JARs were found."
            exit 1
          fi

          : > dist/jars/manifest.tsv
          for jar in "${jar_files[@]}"; do
            module="$jar"
            case "$jar" in
              */root/build/libs/*)
                module="root"
                ;;
              */core/echocore/build/libs/*)
                module="core/echocore"
                ;;
              */addons/*/build/libs/*)
                module="${jar#*/addons/}"
                module="addons/${module%%/*}"
                ;;
            esac

            target_name="${module//\//__}__$(basename "$jar")"
            cp "$jar" "dist/jars/$target_name"
            printf '%s\t%s\t%s\n' "$module" "$(basename "$jar")" "$target_name" >> dist/jars/manifest.tsv
          done

      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: echo-jars-${{ github.sha }}
          path: dist/jars/*.jar
          if-no-files-found: error
          retention-days: 21

      - name: Summarize built JARs
        run: |
          set -euo pipefail
          {
            echo "## Runtime JAR Artifacts"
            echo
            echo "| Module | JAR |"
            echo "| --- | --- |"
            while IFS=$'\t' read -r module source_jar target_jar; do
              echo "| ${module} | ${source_jar} (\`${target_jar}\`) |"
            done < dist/jars/manifest.tsv
          } >> "$GITHUB_STEP_SUMMARY"
