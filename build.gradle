plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    // JEI Maven repositories
    maven {
        name = "Jared's maven"
        url = "https://maven.blamejared.com/"
    }
    maven {
        name = "ModMaven"
        url = "https://modmaven.dev"
    }
}

base {
    archivesName = mod_id
}

// Mojang ships Java 25 to end users in 26.1.2, so mods should target Java 25.
java.toolchain.languageVersion = JavaLanguageVersion.of(25)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            gameDirectory = project.file('run-gametest')
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            clientData()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    implementation project(':echocore')
    compileOnly project(':echoterminal')
    localRuntime project(':echoterminal')
    localRuntime project(':echoorbitalremnants')

    // JEI is optional at runtime. Compile against its API and use the full mod only for local client testing.
    compileOnly "mezz.jei:jei-${minecraft_version}-neoforge-api:${jei_version}"
    localRuntime "mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url = "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

tasks.matching { it.name == 'runClient' }.configureEach {
    description = 'Launches one Minecraft client with Ashfall, ECHO Core, ECHO Terminal, and Orbital Remnants.'
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

tasks.register('buildEchoWorkspace') {
    group = 'build'
    description = 'Builds ECHO Core, ECHO Terminal, ECHO: Ashfall Protocol, and ECHO: Orbital Remnants.'
    dependsOn ':echocore:build'
    dependsOn ':echoterminal:build'
    dependsOn tasks.named('build')
    dependsOn ':echoorbitalremnants:build'
}

def echoPythonExecutable = System.getProperty('os.name').toLowerCase(java.util.Locale.ROOT).contains('windows')
        ? 'python'
        : 'python3'

tasks.register('validateEchoResources', Exec) {
    group = 'verification'
    description = 'Runs ECHO resource, localization, namespace, and packet ID validation.'
    workingDir = projectDir
    commandLine echoPythonExecutable, 'tools/validate_resources.py'
}

tasks.register('validateEchoGameplayData', Exec) {
    group = 'verification'
    description = 'Runs ECHO gameplay data validation.'
    workingDir = projectDir
    commandLine echoPythonExecutable, 'tools/validate_gameplay_data.py'
}

tasks.register('generateEchoPoiStructures', Exec) {
    group = 'generation'
    description = 'Regenerates ECHO: Ashfall Protocol POI structure templates from the canonical Python generator.'
    workingDir = projectDir
    commandLine echoPythonExecutable, 'tools/structure_generator/generator.py'
}

tasks.register('checkEchoPoiStructures', Exec) {
    group = 'verification'
    description = 'Validates generated POI structure templates and template-pool coverage.'
    workingDir = projectDir
    commandLine echoPythonExecutable, 'tools/structure_generator/generator.py', '--check'
}

tasks.register('checkEchoRuntimeLogs', Exec) {
    group = 'verification'
    description = 'Scans recent run*/logs and crash-reports for fresh ECHO startup crash signatures.'
    workingDir = projectDir
    commandLine echoPythonExecutable,
            'tools/check_echo_runtime_logs.py',
            '--max-age-minutes',
            (project.findProperty('echoRuntimeLogMaxAgeMinutes') ?: '180').toString()
}

tasks.named('checkEchoRuntimeLogs') {
    mustRunAfter ':echocore:runGameTestServer'
    mustRunAfter ':echoterminal:runGameTestServer'
    mustRunAfter tasks.named('runGameTestServer')
    mustRunAfter ':echoorbitalremnants:runGameTestServer'
}

tasks.register('verifyEchoRelease') {
    group = 'verification'
    description = 'Runs release-hardening validators, workspace build, and both GameTest servers.'
    dependsOn tasks.named('validateEchoResources')
    dependsOn tasks.named('validateEchoGameplayData')
    dependsOn tasks.named('checkEchoPoiStructures')
    dependsOn 'checkEchoModJarSet'
    dependsOn tasks.named('checkEchoRuntimeLogs')
    dependsOn tasks.named('buildEchoWorkspace')
    dependsOn ':echocore:runGameTestServer'
    dependsOn ':echoterminal:runGameTestServer'
    dependsOn tasks.named('runGameTestServer')
    dependsOn ':echoorbitalremnants:runGameTestServer'
}

def echoExpectedModJars = [
        [mod: project(':echocore').mod_id.toString(), version: project(':echocore').mod_version.toString()],
        [mod: project(':echoterminal').mod_id.toString(), version: project(':echoterminal').mod_version.toString()],
        [mod: mod_id.toString(), version: mod_version.toString()],
        [mod: project(':echoorbitalremnants').mod_id.toString(), version: project(':echoorbitalremnants').mod_version.toString()],
]
def echoExpectedModJarNames = echoExpectedModJars.collect { "${it.mod}-${it.version}.jar".toString() } as Set
def echoSanityModsDir = project.findProperty('echoModpackModsDir')
        ? file(project.property('echoModpackModsDir'))
        : file('C:/Users/Ivan/curseforge/minecraft/Instances/Axes of Tomorrow/mods')

tasks.register('checkEchoModJarSet') {
    group = 'verification'
    description = 'Fails when a target modpack mods folder mixes stale or duplicate ECHO jars.'

    doLast {
        def modsDir = echoSanityModsDir
        if (!modsDir.exists()) {
            throw new GradleException("Modpack mods folder not found: ${modsDir}. Pass -PechoModpackModsDir=<path>.")
        }

        def echoJars = (modsDir.listFiles() ?: [] as File[]).findAll { jar ->
            jar.isFile()
                    && jar.name.endsWith('.jar')
                    && echoExpectedModJars.any { spec ->
                        jar.name.toLowerCase(java.util.Locale.ROOT).startsWith("${spec.mod}-")
                    }
        }

        echoExpectedModJars.each { spec ->
            def matches = echoJars.findAll { it.name.toLowerCase(java.util.Locale.ROOT).startsWith("${spec.mod}-") }
            if (matches.size() != 1) {
                throw new GradleException("Expected exactly one ${spec.mod} jar in ${modsDir}, found ${matches*.name}.")
            }
            def expectedName = "${spec.mod}-${spec.version}.jar"
            if (matches[0].name != expectedName) {
                throw new GradleException("Stale ${spec.mod} jar in ${modsDir}: found ${matches[0].name}, expected ${expectedName}.")
            }
        }

        def stale = echoJars.findAll { !echoExpectedModJarNames.contains(it.name) }
        if (!stale.isEmpty()) {
            throw new GradleException("Stale ECHO jars in ${modsDir}: ${stale*.name}. Remove old jars before release testing.")
        }
        logger.lifecycle("ECHO mod jar set clean in ${modsDir}: ${echoExpectedModJarNames.sort()}")
    }
}

tasks.register('copyEchoJarsToModpack', Copy) {
    group = 'distribution'
    description = 'Builds and copies all ECHO jars into the local CurseForge modpack mods folder.'

    def coreProject = project(':echocore')
    def terminalProject = project(':echoterminal')
    def addonProject = project(':echoorbitalremnants')
    def modpackModsDir = project.findProperty('echoModpackModsDir')
            ? file(project.property('echoModpackModsDir'))
            : file('C:/Users/Ivan/curseforge/minecraft/Instances/ECHO Ashfall Protocol/mods')

    dependsOn ':echocore:build'
    dependsOn ':echoterminal:build'
    dependsOn tasks.named('build')
    dependsOn ':echoorbitalremnants:build'
    from(coreProject.layout.buildDirectory.file("libs/${coreProject.mod_id}-${coreProject.mod_version}.jar"))
    from(terminalProject.layout.buildDirectory.file("libs/${terminalProject.mod_id}-${terminalProject.mod_version}.jar"))
    from(layout.buildDirectory.file("libs/${mod_id}-${mod_version}.jar"))
    from(addonProject.layout.buildDirectory.file("libs/${addonProject.mod_id}-${addonProject.mod_version}.jar"))
    into modpackModsDir

    doFirst {
        if (!modpackModsDir.exists()) {
            throw new GradleException("Modpack mods folder not found: ${modpackModsDir}")
        }
        def stale = (modpackModsDir.listFiles() ?: [] as File[]).findAll { jar ->
            jar.isFile()
                    && jar.name.endsWith('.jar')
                    && echoExpectedModJars.any { spec ->
                        jar.name.toLowerCase(java.util.Locale.ROOT).startsWith("${spec.mod}-")
                    }
                    && !echoExpectedModJarNames.contains(jar.name)
        }
        if (!stale.isEmpty()) {
            throw new GradleException("Stale ECHO jars in ${modpackModsDir}: ${stale*.name}. Remove them before copying release jars.")
        }
    }
}
task checkApi {
    doLast {
        def blockEntityTypeClass = Class.forName('net.minecraft.world.level.block.entity.BlockEntityType', true, project.buildscript.classLoader)
        println(blockEntityTypeClass.getDeclaredClasses())
    }
}
