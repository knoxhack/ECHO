#Advanced common configuration for ECHO: Ashfall Protocol.
#Runtime structure settings affect Java-driven procedural structures only.
#Datapack jigsaw POIs and biome terrain distribution are controlled by worldgen JSON.

[survival]
	#Range: 0 ~ 10
	airFilterDecayRate = 1
	globalToxicAir = false
	enableBiomeHazards = true
	enableRadiationStorms = true
	#Range: 0.0 ~ 5.0
	toxicHazardFilterMultiplier = 1.0
	#Range: 0.0 ~ 10.0
	radiationAccumulationRate = 1.0
	#Range: 0.0 ~ 5.0
	radiationHazardMultiplier = 1.0
	#Range: 0.0 ~ 5.0
	radiationDecayRate = 0.2
	#Range: 0.0 ~ 5.0
	cryoColdLossMultiplier = 1.0
	#Range: 0.0 ~ 5.0
	nexusHazardMultiplier = 1.25
	#Range: 4 ~ 64
	scrubberSafeZoneRadius = 16
	#Range: 0 ~ 5
	hydrationDecayRate = 1
	#Range: 20 ~ 72000
	hydrationDecayIntervalTicks = 600
	#Range: 0 ~ 100
	hydrationWarningLevel = 40
	#Range: 0 ~ 100
	hydrationPenaltyLevel = 15
	#Range: 0 ~ 1200
	toxicAirWarningTicks = 100
	#Range: 40 ~ 6000
	hazardWarningCooldownTicks = 240

[machines]
	#Range: 20 ~ 600
	recyclerProcessTime = 80
	#Range: 0.0 ~ 0.1
	generatorFailureChance = 0.002

[mutations]
	#Range: 10.0 ~ 100.0
	mutationThreshold = 50.0
	#Range: 10.0 ~ 100.0
	mutationSevereThreshold = 80.0
	#Range: 200 ~ 72000
	mutationRollCooldownTicks = 12000

[events]
	#Range: 0.0 ~ 5.0
	eventReactivityMultiplier = 1.0

[echo]
	echoEnabled = true
	#Range: 100 ~ 6000
	echoMessageCooldown = 600

[fastTravel]
	enableFastTravel = true
	#Range: 200 ~ 72000
	fastTravelCooldownTicks = 6000

[loot]
	#Range: 0.0 ~ 0.5
	schematicDropRate = 0.05

[structures]
	enableProceduralStructures = true
	#Range: 0.05 ~ 10.0
	globalDensityMultiplier = 1.0

[structures.drop_pod]
	enabled = true
	spacing = 20
	separation = 5

[structures.bio_lab]
