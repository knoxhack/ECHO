[biomes]
	#These toggles control Java-driven biome content checks only.
	#They do not remove biomes from datapack terrain generation or existing worlds.
	theWasteland = true
	ruinedPlains = true
	crashZoneWasteland = true
	industrialRuins = true
	toxicSwamp = true
	ruinedCityscape = true
	radiationZone = true
	cryogenicRuins = true
	nexusScar = true

[legacyPoi]
	factionHubSpacing = 40
	worldPoiSpacing = 25
	enableCryogenicRuins = true

[difficulty]
	defaultDifficulty = "NORMAL"
