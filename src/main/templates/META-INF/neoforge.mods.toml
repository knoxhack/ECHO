license="${mod_license}"
issueTrackerURL="https://github.com/knoxhack/Echo/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/knoxhack/Echo"
authors="KnoxHack"
credits="Main Ashfall survival protocol and shared route content for the ECHO mod family."
description='''
ECHO: Ashfall Protocol is the main wasteland survival chapter for ECHO.
It provides the Ashfall biome loop, missions, POIs, factions, guardians,
Nexus progression, and cross-addon survival foundations.
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echocore"
type="required"
reason="Provides shared ECHO player data, faction, route, terminal, and discovery APIs."
versionRange="[1.1.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoterminal"
type="optional"
reason="Enables Ashfall mission, route, faction, and discovery surfaces inside the modular ECHO Terminal."
versionRange="[1.1.0,)"
ordering="AFTER"
side="BOTH"
