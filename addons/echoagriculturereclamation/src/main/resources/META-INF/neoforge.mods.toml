modId="echoagriculturereclamation"
version="0.1.1"
displayName="ECHO: Agriculture Reclamation"
displayURL="https://github.com/knoxhack/echo"
authors="KnoxHack"
credits="Built as the ruined-world ecology recovery chapter for the ECHO beta stack."
description='''
The player brings life back to a dead world.

ECHO: Agriculture Reclamation adds recovered seeds, contaminated soil,
hydroponics, gene stabilization, greenhouses, bio-reactors, and chunk-local
ecological restoration without rewriting biome ids.
'''

