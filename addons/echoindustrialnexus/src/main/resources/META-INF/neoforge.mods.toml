[[mods]]
modId="echoindustrialnexus"
version="0.1.0"
displayName="ECHO: Industrial Nexus"
displayURL="https://github.com/knoxhack/echo"
authors="KnoxHack"
credits="Built as the industrial automation chapter for the ECHO public release stack."
description='''
The world ended. Industry did not.

ECHO: Industrial Nexus turns Ashfall survival into infrastructure through Thermal Flux,
rusted machines, salvage processing, automated filters, industrial recovery blocks,
and Nexus-safe factory components surfaced through ECHO Core and ECHO Terminal.
'''

