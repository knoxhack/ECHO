license="${mod_license}"
issueTrackerURL="https://github.com/knoxhack/Echo/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/knoxhack/Echo"
authors="KnoxHack"
credits="Find the lag. Protect the signal. Restore performance."
description='''
ECHO RuntimeGuard is the first-party performance optimization, diagnostics,
smart ticking, particle budgeting, network guard, and runtime protection layer
for the ECHO/Ashfall ecosystem.
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echocore"
type="required"
reason="Provides shared ECHO addon and config service APIs."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echonetcore"
type="required"
reason="Provides shared ECHO network helpers and packet diagnostics."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoterminal"
type="optional"
reason="Terminal can expose RuntimeGuard signal health pages."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echomultiblockcore"
type="optional"
reason="MultiblockCore can consume the validation scheduler."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoholomap"
type="optional"
reason="HoloMap can consume marker refresh, sync, and animation budgets."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echolens"
type="optional"
reason="Lens can consume scan budget and passive scan throttles."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
