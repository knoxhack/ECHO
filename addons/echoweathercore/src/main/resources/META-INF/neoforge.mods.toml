[[mods]]
modId="echoweathercore"
version="1.2.0"
displayName="ECHO: WeatherCore"
displayURL="https://github.com/knoxhack/echo"
authors="KnoxHack"
credits="Built as the shared weather, atmospheric hazard, storm forecasting, and environmental event system for the ECHO/Ashfall ecosystem."
description='''
The world is unstable. Read the sky.

ECHO WeatherCore provides ruined-world weather, atmospheric hazards, storm
forecasting, route pressure, cinematic environmental events, scanner interference,
HoloMap distortion, PowerGrid instability hooks, drone weather warnings,
faction patrol behavior hooks, and data-driven weather profiles for the ECHO
ecosystem. Weather changes expedition decisions, not just annoys the player.
'''

