[[mods]]
modId="echologisticsnetwork"
version="1.1.0"
displayName="ECHO: Logistics Network"
displayURL="https://github.com/knoxhack/echo"
authors="KnoxHack"
credits="Built as the supply operations chapter for the ECHO public release stack."
description='''
Your base becomes a real supply operation.

ECHO: Logistics Network adds labelled storage networks, expedition loadouts,
physical courier drone delivery, auto-restocking, remote reward relays, and
faction depots surfaced through ECHO Core and ECHO Terminal. Its 0.4 API also
keeps Industrial factory input depots stocked through data-driven loadouts.
'''

