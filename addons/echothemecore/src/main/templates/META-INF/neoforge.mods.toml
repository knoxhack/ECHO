modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"
issueTrackerURL="https://github.com/knoxhack/Echo/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/knoxhack/Echo"
authors="KnoxHack"
credits="Shared visual, audio, UI, and development-time asset theme manager for ECHO."
description='''
ECHO ThemeCore provides data-driven visual, audio, UI, vanilla UI skin, and asset-pipeline theme services for the ECHO/Ashfall ecosystem.
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echocore"
type="required"
reason="Provides shared ECHO service and config registry contracts."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echorendercore"
type="optional"
reason="Allows RenderCore consumers to use ThemeCore render profiles and presets."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoruntimeguard"
type="optional"
reason="Allows ThemeCore visual settings to honor RuntimeGuard performance modes."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
