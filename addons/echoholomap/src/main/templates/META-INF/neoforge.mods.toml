modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Knoxhack"
description='''Terminal-integrated HoloMap command display for ECHO regions, routes, hazards, missions, scans, and addon map markers.'''

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echocore"
type="required"
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echonetcore"
type="required"
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoruntimeguard"
type="optional"
reason="Enables performance budget diagnostics for HoloMap render passes when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoterminal"
type="optional"
reason="Adds HoloMap terminal pages, map controls, and waypoint actions when Terminal is present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echorendercore"
type="optional"
reason="Uses RenderCore V18 screen chrome and visual profiles for HoloMap surfaces when present."
versionRange="[1.2.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echomissioncore"
type="optional"
reason="Registers HoloMap discovery and waypoint side-op missions when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
