modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Knoxhack"
description='''Shared ECHO world-region, marker, hazard, discovery, and world event framework.'''

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echocore"
type="required"
versionRange="[1.1.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echonetcore"
type="required"
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoterminal"
type="optional"
reason="Surfaces world region and hazard data inside the Terminal when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoashfallprotocol"
type="optional"
reason="Receives Ashfall-specific world regions, hazards, and markers at runtime."
versionRange="[1.0.0,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoorbitalremnants"
type="optional"
reason="Receives orbital-specific world regions and markers at runtime."
versionRange="[1.0.0,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoconvoyprotocol"
type="optional"
reason="Receives convoy route world regions and markers at runtime."
versionRange="[1.0.0,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echonexusprotocol"
type="optional"
reason="Receives Nexus anomaly world regions and markers at runtime."
versionRange="[1.0.0,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echorendercore"
type="optional"
reason="Enables render profile overrides for world region discovery UI."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
