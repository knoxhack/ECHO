license="${mod_license}"
issueTrackerURL="https://github.com/knoxhack/Echo/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/knoxhack/Echo"
authors="KnoxHack"
credits="Reusable tactical terminal framework extracted from the ECHO stack."
description='''
SignalOS provides a reusable in-game terminal framework with chapters, missions, archives, rewards, diagnostics, Java APIs, and datapack JSON content.
'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echocore"
type="required"
versionRange="[1.1.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="kubejs"
type="optional"
versionRange="[7.0.0,)"
ordering="AFTER"
side="BOTH"
