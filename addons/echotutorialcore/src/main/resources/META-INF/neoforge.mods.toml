[[mods]]
modId="echotutorialcore"
version="0.1.0"
displayName="ECHO: TutorialCore"
displayURL="https://github.com/knoxhack/echo"
authors="KnoxHack"
credits="Built as the shared onboarding, guided tutorials, contextual hints, first-time popups, mistake detection, Terminal tutorial cards, beginner guide mode, and codex-style help for the entire ECHO/Ashfall ecosystem."
description='''
Make Ashfall deep, but not confusing.

ECHO TutorialCore provides diegetic guidance through the ECHO-7 persona, Terminal Guide cards, contextual field hints, mistake detection, requirement explanations, and tutorial flows. It is designed to be immersive, non-spammy, and ignorable by experts while remaining invaluable to newcomers.
'''

