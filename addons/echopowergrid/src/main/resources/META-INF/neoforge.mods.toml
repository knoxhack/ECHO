[[mods]]
modId="echopowergrid"
version="0.1.0"
displayName="ECHO: PowerGrid"
displayURL="https://github.com/knoxhack/echo"
authors="KnoxHack"
credits="Built as the shared power generation, storage, transfer, and grid infrastructure for the ECHO/Ashfall ecosystem."
description='''
Restore the grid. Power the signal.

ECHO PowerGrid provides the shared first-party power generation, storage, cable,
substation, overload, brownout, and facility power system for the full ECHO/Ashfall
ecosystem. It is the energy backbone for terminals, signal towers, industrial
machines, multiblock facilities, convoy depots, orbital launchpads, agriculture
domes, blackbox archives, nexus stabilizers, and armory fabricators.
'''

