modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"
issueTrackerURL="https://github.com/knoxhack/echo/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/knoxhack/echo"
authors="KnoxHack"
description='''Shared mission, objective, progression, reward, and Terminal feed engine for ECHO addons.'''

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echocore"
type="required"
reason="Provides the mission service contracts and no-op fallback."
versionRange="[1.1.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoterminal"
type="optional"
reason="Displays MissionCore chapters, actions, and explicit route placement in the ECHO Terminal."
versionRange="[1.2.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoworldcore"
type="optional"
reason="Bridges WorldCore region, hazard, and marker events into mission objectives when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
