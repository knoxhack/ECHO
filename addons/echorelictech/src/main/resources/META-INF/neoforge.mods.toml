[[mods]]
modId="echorelictech"
version="1.2.0"
displayName="ECHO: RelicTech"
displayURL="https://github.com/knoxhack/echo"
authors="KnoxHack"
credits="ECHO: RelicTech - rare pre-Gridfall artifacts, forbidden prototypes, damaged AI cores, and unstable relic devices."
description='''
ECHO: RelicTech is Ashfall's legendary loot chase.

Players recover damaged old-world prototypes from vaults, labs, blacksites, and orbital wreckage,
then identify, repair, stabilize, overclock, contain, or risk using them.

Every relic is powerful enough to be exciting, but dangerous enough to respect.
'''

