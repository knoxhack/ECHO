license="${mod_license}"
issueTrackerURL="https://github.com/knoxhack/Echo/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="https://github.com/knoxhack/Echo"
authors="KnoxHack"
credits="Shared audio identity, adaptive music, ambience, stingers, UI sounds, and generated-music pipeline support for the entire ECHO ecosystem."
description='''
ECHO: SoundCore provides the shared first-party audio framework for the ECHO/Ashfall ecosystem:
- adaptive music and priority-based track selection
- biome, faction, combat, and boss music
- mission stingers and chapter themes
- Terminal, Lens, HoloMap, SignalOS, and PowerGrid UI sounds
- ambience layers for Nexus, Blackbox, Stationfall, and Orbital
- data-driven music and ambience profiles
- Suno AI music pipeline support
'''

