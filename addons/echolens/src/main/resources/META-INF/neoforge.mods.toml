modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="${neo_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echocore"
type="required"
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echonetcore"
type="required"
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoterminal"
type="optional"
reason="Publishes Lens scan and inspection surfaces into the modular ECHO Terminal when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoindex"
type="optional"
reason="Allows Lens inspection results to cross-link item and recipe details through ECHO Index."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoruntimeguard"
type="optional"
reason="Enables performance budget diagnostics for Lens scan and render passes when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echorendercore"
type="optional"
reason="Uses RenderCore V18 screen chrome and visual profiles for Lens HUD surfaces when present."
versionRange="[1.2.0,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="echomissioncore"
type="optional"
reason="Registers Lens scan and machine diagnostic side-op missions when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
