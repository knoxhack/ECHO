modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"
issueTrackerURL="https://github.com/knoxhack/Echo"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Knoxhack"
description='''
Shared ECHO knowledge archive, item browser, recipe browser, usage browser, inventory overlay, and Terminal codex layer.
'''

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
