modLoader="javafml"
loaderVersion="[1,)"
license="${mod_license}"
issueTrackerURL="https://github.com/knoxhack/Echo"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Knoxhack"
description='''
Shared ECHO knowledge archive, item browser, recipe browser, usage browser, inventory overlay, and Terminal codex layer.
'''

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echocore"
type="required"
versionRange="[1.1.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echonetcore"
type="required"
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echorendercore"
type="optional"
reason="Enables RenderCore V18 screen chrome, visual profiles, preview overlays, and index entry previews when present."
versionRange="[1.2.0,)"
ordering="AFTER"
side="CLIENT"

[[dependencies.${mod_id}]]
modId="echoterminal"
type="optional"
reason="Adds Index catalog and recipe lookup surfaces inside Terminal when present."
versionRange="[1.1.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echomissioncore"
type="optional"
reason="Registers Index-related side-op missions when MissionCore is present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
