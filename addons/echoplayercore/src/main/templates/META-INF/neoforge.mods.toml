license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="KnoxHack"
description='''Player utility, homes, random teleport, back, spawn, cooldown, and travel QoL systems for the ECHO/Ashfall ecosystem.'''

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echocore"
type="required"
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echonetcore"
type="required"
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echodatacore"
type="optional"
reason="Persists player utility state through DataCore when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoworldcore"
type="optional"
reason="Uses WorldCore location, region, and hazard context for travel commands when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoterminal"
type="optional"
reason="Exposes PlayerCore travel and utility actions in the modular ECHO Terminal when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoholomap"
type="optional"
reason="Shares homes, spawn, and travel waypoints with HoloMap when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="echoruntimeguard"
type="optional"
reason="Uses RuntimeGuard budgets and diagnostics for travel-command safety when present."
versionRange="[1.0.0,)"
ordering="AFTER"
side="BOTH"
