[[mods]]
modId="echorecovery"
version="1.0.0"
displayName="ECHO: Recovery"
displayURL="https://github.com/knoxhack/echo"
authors="KnoxHack"
credits="Standalone-first death recovery for the ECHO ecosystem."
description='''
ECHO Recovery provides graves, death caches, recovery compasses, and grave keys.
Works standalone with ECHO Core + NetCore. Optionally integrates with Terminal,
ThemeCore, HoloMap, MissionCore, TutorialCore, SoundCore, WorldCore, WeatherCore,
Lens, Armory, Logistics, Convoy, PowerGrid, RelicTech, Nexus, Blackbox, and Ashfall.
'''

